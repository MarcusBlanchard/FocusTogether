<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowlocked — Session ended</title>
  <link rel="stylesheet" href="/notification-shared.css" />
  <script>
    window.__NOTIFICATION_PARTICLES__ = {
      color: '#c084fc',
      alpha: 0.42,
      particleCount: 46,
      animationSpeed: 1,
    };
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      --ft-outline: #7c3aed;
      -webkit-user-select: none;
      user-select: none;
    }
    .card {
      padding: 14px 16px 14px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .ft-card-wrap {
      width: 100%;
      max-width: 280px;
      animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .icon-wrapper {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 8px;
      flex-shrink: 0;
      background: linear-gradient(145deg, #ede9fe, #ddd6fe);
      box-shadow: 0 2px 8px rgba(139, 92, 246, 0.22);
    }
    .icon-wrapper svg {
      width: 22px;
      height: 22px;
      stroke: #6d28d9;
    }
    .title {
      font-size: 15px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 4px;
      letter-spacing: -0.25px;
    }
    .message {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
      font-weight: 450;
      margin-bottom: 12px;
    }
    .dismiss {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(145deg, #7c3aed, #6d28d9);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(109, 40, 217, 0.32);
      flex-shrink: 0;
    }
    .dismiss:hover {
      filter: brightness(1.05);
    }
    .dismiss:active {
      transform: scale(0.98);
    }
    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      background: rgba(139, 92, 246, 0.12);
      border-radius: 10px;
      font-size: 9px;
      color: #5b21b6;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      flex-shrink: 0;
    }
    .ft-brand {
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="ft-notif-shell">
    <canvas id="particle-canvas" aria-hidden="true"></canvas>
    <div class="ft-card card ft-card-wrap">
        <div class="ft-brand">
          <img src="/flowlocked-logo.png" width="28" height="28" alt="" />
          <span class="ft-brand-name">Flowlocked</span>
        </div>
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div class="title" id="title">Session ended</div>
        <div class="message" id="body">Room will close soon.</div>
        <button type="button" class="dismiss" id="dismiss">Dismiss</button>
        <div class="badge">Focus Session</div>
    </div>
  </div>

  <script>
    window.addEventListener('error', (e) => { e.preventDefault(); return false; });
    window.addEventListener('unhandledrejection', (e) => { e.preventDefault(); return false; });

    let isClosing = false;

    async function safeClose() {
      if (isClosing) return;
      isClosing = true;
      try {
        const T = window.__TAURI__;
        const currentWindow = T && T.window && typeof T.window.getCurrent === 'function'
          ? T.window.getCurrent()
          : null;
        const label = currentWindow && currentWindow.label;
        const invoke =
          (T && T.invoke) ||
          (T && T.tauri && typeof T.tauri.invoke === 'function' && T.tauri.invoke.bind(T.tauri)) ||
          null;
        if (label && invoke) {
          await invoke('dismiss_session_ending_window', { label });
          return;
        }
        if (currentWindow && typeof currentWindow.close === 'function') {
          await currentWindow.close();
        }
      } catch (e) {
        console.error('[SessionEnding] Close error:', e);
      }
    }

    document.getElementById('dismiss').addEventListener('click', () => safeClose());

    (async () => {
      try {
        if (!window.__TAURI__ || !window.__TAURI__.event) return;
        const { listen } = window.__TAURI__.event;
        await listen('session-ending-message', (event) => {
          if (isClosing) return;
          try {
            const { title, body } = event.payload || {};
            const titleEl = document.getElementById('title');
            const bodyEl = document.getElementById('body');
            if (titleEl && title) titleEl.textContent = title;
            if (bodyEl && body) bodyEl.textContent = body;
          } catch (_) { /* ignore */ }
        });
      } catch (_) { /* ignore */ }
    })().catch(() => {});
  </script>
  <script src="/notification-particles.js" defer></script>
</body>
</html>
