<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowlocked Warning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #fef9c3 0%, #fde047 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 0;
      margin: 0;
      -webkit-user-select: none;
      user-select: none;
      transition: background 0.4s ease;
    }
    
    body.distracted {
      background: linear-gradient(145deg, #fecaca 0%, #f87171 100%);
    }
    
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 24px 28px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.15);
      width: 90%;
      max-width: 340px;
      text-align: center;
      animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .icon-wrapper {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      background: linear-gradient(145deg, #fef3c7, #fde68a);
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
      transition: all 0.4s ease;
    }
    
    body.distracted .icon-wrapper {
      background: linear-gradient(145deg, #fee2e2, #fecaca);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    
    .icon-wrapper svg {
      width: 28px;
      height: 28px;
      stroke: #b45309;
      transition: stroke 0.4s ease;
    }
    
    body.distracted .icon-wrapper svg {
      stroke: #dc2626;
    }
    
    .title {
      font-size: 17px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    
    .message {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.5;
      font-weight: 450;
    }
    
    .countdown {
      margin-top: 14px;
      font-size: 32px;
      font-weight: 700;
      color: #ca8a04;
      transition: color 0.4s ease;
      line-height: 1.1;
    }
    
    body.distracted .countdown {
      display: none;
    }
    
    .hint {
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(251, 191, 36, 0.15);
      border-radius: 10px;
      font-size: 12px;
      color: #92400e;
      font-weight: 500;
      transition: all 0.4s ease;
    }
    
    body.distracted .hint {
      background: rgba(239, 68, 68, 0.12);
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrapper">
      <svg id="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
      </svg>
    </div>
    <div class="title" id="title">Idle Warning</div>
    <div class="message" id="body">You're about to be marked as distracted. Move your mouse or type.</div>
    <div class="countdown" id="countdown" style="display: none;">30</div>
    <div class="hint" id="hint">Move mouse or type to dismiss</div>
  </div>
  
  <script>
    window.addEventListener('error', (e) => { e.preventDefault(); return false; });
    window.addEventListener('unhandledrejection', (e) => { e.preventDefault(); return false; });
    
    (async () => {
      try {
        if (window.__TAURI__ && window.__TAURI__.event) {
          const { listen } = window.__TAURI__.event;
          
          await listen('notification-message', (event) => {
            try {
              const { title, body, isDistracted, countdown } = event.payload || {};
              const titleEl = document.getElementById('title');
              const bodyEl = document.getElementById('body');
              const iconEl = document.getElementById('icon');
              const hintEl = document.getElementById('hint');
              const countdownEl = document.getElementById('countdown');
              
              if (titleEl && title) titleEl.textContent = title;
              if (bodyEl && body) bodyEl.textContent = body;
              
              if (countdown !== undefined && countdownEl) {
                const n = Number(countdown);
                if (Number.isFinite(n) && n > 0) {
                  countdownEl.style.display = 'block';
                  countdownEl.textContent = String(Math.ceil(n));
                } else {
                  countdownEl.style.display = 'none';
                }
              }
              
              if (isDistracted) {
                document.body.classList.add('distracted');
                if (hintEl) hintEl.textContent = 'Session participants notified';
                if (countdownEl) countdownEl.style.display = 'none';
                if (iconEl) {
                  iconEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />';
                }
              } else {
                document.body.classList.remove('distracted');
                if (hintEl) hintEl.textContent = 'Move mouse or type to dismiss';
              }
            } catch (error) {
              console.error('[Notification] Error:', error);
            }
          });
        }
      } catch (error) {
        console.error('[Notification] Setup error:', error);
      }
    })().catch(() => {});
  </script>
</body>
</html>
