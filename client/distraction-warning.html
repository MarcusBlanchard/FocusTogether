<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowlocked - Distraction Warning</title>
  <link rel="stylesheet" href="/notification-shared.css" />
  <script>
    window.__NOTIFICATION_PARTICLES__ = {
      color: '#fb923c',
      alpha: 0.42,
      particleCount: 52,
      animationSpeed: 1,
    };
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      --ft-outline: #ea580c;
      -webkit-user-select: none;
      user-select: none;
      transition: background 0.4s ease;
    }

    body.distracted {
      --ft-outline: #dc2626;
    }
    
    .card {
      padding: 22px 24px 18px;
      text-align: center;
      animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .icon-wrapper {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
      transition: all 0.4s ease;
    }
    
    body.distracted .icon-wrapper {
      background: rgba(248, 113, 113, 0.15);
      border-color: rgba(248, 113, 113, 0.35);
    }
    
    .icon-wrapper svg {
      width: 28px;
      height: 28px;
      stroke: #fb923c;
      transition: stroke 0.4s ease;
      filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.9));
    }
    
    body.distracted .icon-wrapper svg {
      stroke: #fca5a5;
    }
    
    .title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    
    .message {
      font-size: 14px;
      line-height: 1.55;
      font-weight: 450;
    }
    
    .countdown {
      margin-top: 16px;
      font-size: 32px;
      font-weight: 700;
      color: #fdba74;
      transition: color 0.4s ease;
    }
    
    body.distracted .countdown {
      color: #fca5a5;
    }
    
    .hint {
      margin-top: 12px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      font-size: 12px;
      color: #e2e8f0;
      font-weight: 500;
      transition: all 0.4s ease;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
    }
    
    body.distracted .hint {
      background: rgba(127, 29, 29, 0.4);
      border-color: rgba(252, 165, 165, 0.25);
      color: #fecaca;
    }
    
    .settings-hint {
      margin-top: 10px;
      font-size: 11px;
      color: #94a3b8;
      font-weight: 400;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
    }
    
    body.distracted .settings-hint {
      display: none;
    }

    .ft-card-wrap {
      width: 100%;
      max-width: 440px;
    }
  </style>
</head>
<body>
  <div class="ft-notif-shell">
    <canvas id="particle-canvas" aria-hidden="true"></canvas>
    <div class="ft-card card ft-card-wrap">
        <div class="ft-brand">
          <img src="/flowlocked-logo.png" width="28" height="28" alt="" />
          <span class="ft-brand-name">Flowlocked</span>
        </div>
        <div class="icon-wrapper">
          <svg id="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
          </svg>
        </div>
        <div class="title" id="title">Distracting App Detected</div>
        <div class="message" id="body">Switch back to productive work to stay focused</div>
        <div class="countdown" id="countdown">10</div>
        <div class="hint" id="hint">Close distracting app to dismiss</div>
        <div class="settings-hint">You can change what apps are distracting on your profile page.</div>
    </div>
  </div>
  
  <script>
    window.addEventListener('error', (e) => { e.preventDefault(); return false; });
    window.addEventListener('unhandledrejection', (e) => { e.preventDefault(); return false; });
    
    let countdownValue = 10;
    let countdownInterval = null;
    
    function startCountdown() {
      if (countdownInterval) return;
      
      countdownInterval = setInterval(() => {
        countdownValue--;
        const countdownEl = document.getElementById('countdown');
        if (countdownEl) {
          countdownEl.textContent = countdownValue;
        }
        
        if (countdownValue <= 0) {
          clearInterval(countdownInterval);
          countdownInterval = null;
        }
      }, 1000);
    }
    
    (async () => {
      try {
        if (window.__TAURI__ && window.__TAURI__.event) {
          const { listen } = window.__TAURI__.event;
          
          await listen('distraction-warning-message', (event) => {
            try {
              const { title, body, countdown, isDistracted } = event.payload || {};
              const titleEl = document.getElementById('title');
              const bodyEl = document.getElementById('body');
              const countdownEl = document.getElementById('countdown');
              const hintEl = document.getElementById('hint');
              const iconEl = document.getElementById('icon');
              const particles = window.__notificationParticles;
              
              if (titleEl && title) titleEl.textContent = title;
              if (bodyEl && body) bodyEl.textContent = body;
              if (countdownEl && countdown !== undefined) {
                countdownValue = countdown;
                countdownEl.textContent = countdown;
              }
              
              if (isDistracted) {
                document.body.classList.add('distracted');
                if (particles && typeof particles.setColor === 'function') {
                  particles.setColor('#f87171', 0.44);
                }
                if (hintEl) hintEl.textContent = 'Session participants notified';
                if (countdownEl) countdownEl.style.display = 'none';
                if (iconEl) {
                  iconEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />';
                }
              } else {
                document.body.classList.remove('distracted');
                if (particles && typeof particles.setColor === 'function') {
                  particles.setColor('#fb923c', 0.42);
                }
                if (countdownEl) countdownEl.style.display = '';
                startCountdown();
              }
            } catch (error) {
              console.error('[DistractionWarning] Error:', error);
            }
          });
        }
        
        startCountdown();
      } catch (error) {
        console.error('[DistractionWarning] Setup error:', error);
      }
    })().catch(() => {});
  </script>
  <script src="/notification-particles.js" defer></script>
</body>
</html>
