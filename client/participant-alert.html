<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTogether Alert</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      color: #1e40af;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      padding: 12px;
    }
    .notification {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 320px;
      text-align: center;
      border: 2px solid #3b82f6;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    @keyframes fadeOut {
      from {
        opacity: 1;
      }
      to {
        opacity: 0;
      }
    }
    .notification.fade-out {
      animation: fadeOut 0.3s ease-out;
    }
    .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 8px;
      font-weight: 600;
      line-height: 1.2;
    }
    p {
      font-size: 12px;
      line-height: 1.4;
      color: #1e3a8a;
    }
  </style>
</head>
<body>
  <div class="notification">
    <div class="icon">👤</div>
    <h2 id="title">FocusTogether Alert</h2>
    <p id="body">A participant is idle</p>
  </div>
  <script>
    // Prevent runtime error overlay
    window.addEventListener('error', function(e) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    });
    window.addEventListener('unhandledrejection', function(e) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    });
    
    let autoCloseTimer = null;
    const AUTO_CLOSE_DELAY = 5000; // 5 seconds
    
    // Wait for Tauri API to be ready
    (async () => {
      try {
        if (window.__TAURI__ && window.__TAURI__.event) {
          const { listen } = window.__TAURI__.event;
          
          await listen('notification-message', (event) => {
            try {
              const { title, body } = event.payload || {};
              const titleEl = document.getElementById('title');
              const bodyEl = document.getElementById('body');
              
              if (titleEl && title) {
                titleEl.textContent = title;
              }
              if (bodyEl && body) {
                bodyEl.textContent = body;
              }
              
              // Start auto-close timer
              if (autoCloseTimer) {
                clearTimeout(autoCloseTimer);
              }
              autoCloseTimer = setTimeout(() => {
                const notification = document.querySelector('.notification');
                if (notification) {
                  notification.classList.add('fade-out');
                  setTimeout(() => {
                    if (window.__TAURI__ && window.__TAURI__.window) {
                      window.__TAURI__.window.getCurrent().close();
                    }
                  }, 300);
                }
              }, AUTO_CLOSE_DELAY);
            } catch (error) {
              console.error('[Notification] Error updating content:', error);
            }
          });
        }
      } catch (error) {
        console.error('[Notification] Error in setup:', error);
      }
    })().catch(() => {});
  </script>
</body>
</html>
