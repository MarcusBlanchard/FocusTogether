<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowlocked Alert</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #dbeafe 0%, #93c5fd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 0;
      margin: 0;
      -webkit-user-select: none;
      user-select: none;
      transition: opacity 0.3s ease-out;
    }
    
    
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      width: 90%;
      max-width: 280px;
      text-align: center;
      animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(60px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }
    
    body.slide-out {
      animation: slideOut 0.35s ease-in forwards;
    }
    
    @keyframes slideOut {
      to {
        opacity: 0;
        transform: translateX(60px) scale(0.96);
      }
    }
    
    .timer {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 22px;
      height: 22px;
    }
    
    .timer svg {
      transform: rotate(-90deg);
      overflow: visible;
    }
    
    .timer-bg {
      fill: none;
      stroke: #e5e7eb;
      stroke-width: 3;
    }
    
    .timer-progress {
      fill: none;
      stroke: #3b82f6;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 75.4;
      stroke-dashoffset: 0;
      animation: countdown 5s linear forwards;
    }
    
    @keyframes countdown {
      to { stroke-dashoffset: 75.4; }
    }
    
    .icon-wrapper {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      background: linear-gradient(145deg, #dbeafe, #bfdbfe);
      box-shadow: 0 3px 8px rgba(59, 130, 246, 0.25);
    }
    
    .icon-wrapper svg {
      width: 20px;
      height: 20px;
      stroke: #2563eb;
    }
    
    .title {
      font-size: 14px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 4px;
      letter-spacing: -0.2px;
    }
    
    .message {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
      font-weight: 450;
    }
    
    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 10px;
      background: linear-gradient(145deg, #dbeafe, #bfdbfe);
      border-radius: 16px;
      font-size: 9px;
      color: #1d4ed8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="timer">
      <svg viewBox="0 0 28 28">
        <circle class="timer-bg" cx="14" cy="14" r="12"></circle>
        <circle class="timer-progress" cx="14" cy="14" r="12"></circle>
      </svg>
    </div>
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
      </svg>
    </div>
    <div class="title" id="title">Participant Alert</div>
    <div class="message" id="body"></div>
    <div class="badge">Focus Session</div>
  </div>
  
  <script>
    window.addEventListener('error', (e) => { e.preventDefault(); return false; });
    window.addEventListener('unhandledrejection', (e) => { e.preventDefault(); return false; });
    
    let isClosing = false;
    
    async function safeClose() {
      if (isClosing) return;
      isClosing = true;
      
      try {
        document.body.classList.add('slide-out');
        await new Promise(resolve => setTimeout(resolve, 350));
        
        if (window.__TAURI__ && window.__TAURI__.window) {
          const currentWindow = window.__TAURI__.window.getCurrent();
          if (currentWindow && typeof currentWindow.close === 'function') {
            await currentWindow.close();
          }
        }
      } catch (e) {
        console.error('[Alert] Close error:', e);
      }
    }
    
    (async () => {
      try {
        if (!window.__TAURI__ || !window.__TAURI__.event) return;
        
        const { listen } = window.__TAURI__.event;
        
        await listen('participant-alert-message', (event) => {
          if (isClosing) return;
          
          try {
            const { title, body } = event.payload || {};
            const titleEl = document.getElementById('title');
            const bodyEl = document.getElementById('body');
            
            if (titleEl && title) titleEl.textContent = title;
            if (bodyEl && body) bodyEl.textContent = body;
            
            // Restart countdown (5s)
            const timerProgress = document.querySelector('.timer-progress');
            if (timerProgress) {
              timerProgress.style.animation = 'none';
              setTimeout(() => {
                timerProgress.style.animation = 'countdown 5s linear forwards';
              }, 10);
            }
            
            // Auto-dismiss after 5 seconds with slide-out animation
            setTimeout(() => safeClose(), 5000);
          } catch (error) {
            // Silently ignore
          }
        });
      } catch (error) {
        // Silently ignore
      }
    })().catch(() => {});
  </script>
</body>
</html>
