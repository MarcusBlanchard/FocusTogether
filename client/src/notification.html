<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusTogether Warning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      color: #92400e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .notification {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      text-align: center;
      border: 2px solid #fbbf24;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 20px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    p {
      font-size: 14px;
      line-height: 1.5;
      color: #78350f;
    }
  </style>
</head>
<body>
  <div class="notification">
    <div class="icon">⚠️</div>
    <h2 id="title">FocusTogether Warning</h2>
    <p id="body">You're about to be marked as distracted. Move your mouse or type.</p>
  </div>
  <script>
    // Listen for message from main process
    if (window.__TAURI__) {
      const { listen } = window.__TAURI__.event;
      
      listen('notification-message', (event) => {
        const { title, body } = event.payload;
        document.getElementById('title').textContent = title;
        document.getElementById('body').textContent = body;
      });
      
      // Auto-close after 5 seconds if still open
      setTimeout(() => {
        if (window.__TAURI__) {
          window.__TAURI__.window.getCurrent().close();
        }
      }, 5000);
    }
  </script>
</body>
</html>
