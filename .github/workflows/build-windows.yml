# Produces the Windows installer (MSI + NSIS) on a real Windows runner.
# Tauri cannot reliably bundle Windows from macOS (generate_context / plist tooling is macOS-oriented when cross-compiling).

name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - activity-refactor
    paths:
      - "src-tauri/**"
      - "client/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - ".github/workflows/build-windows.yml"

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        env:
          CI: "true"
        run: npm run tauri build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: flowlocked-windows
          path: |
            src-tauri/target/release/bundle/msi/*
            src-tauri/target/release/bundle/nsis/*
